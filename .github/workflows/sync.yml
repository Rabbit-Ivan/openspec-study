name: Sync OpenSpec Upstream Data

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.26.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync upstream data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          SYNC_ALERT_WEBHOOK: ${{ secrets.SYNC_ALERT_WEBHOOK }}
        run: pnpm run sync

      - name: Commit and push if changed
        run: |
          git add .last-sha .sync-state.json src/data/upstream.json src/data/translations.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          CURRENT_SHA="$(git rev-parse --short HEAD)"
          git commit -m "chore: sync upstream OpenSpec data (${CURRENT_SHA})"
          git push
